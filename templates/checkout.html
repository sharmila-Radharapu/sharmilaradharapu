<!-- templates/checkout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Abstract Art Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(to right, #89f7fe, #66a6ff); height:100vh; display:flex; justify-content:center; align-items:center; margin:0; font-family:'Segoe UI',sans-serif; }
    .card { background:white; padding:30px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1); width:100%; max-width:500px; }
    .form-label { font-weight:500; }
  </style>
</head>
<body>
  <div class="card">
    <h3 class="mb-4 text-center">🧾 Checkout Details</h3>
    <form action="/checkout" method="post">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input class="form-control" name="phone" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea class="form-control" name="address" rows="3" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Pincode</label>
        <input class="form-control" name="pincode" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Payment Mode</label>
        <select class="form-select" name="payment" required>
          <option value="Credit Card">Credit Card</option>
          <option value="Debit Card">Debit Card</option>
          <option value="UPI">UPI</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100">✅ Place Order</button>
    </form>
  </div>
</body>
</html>
