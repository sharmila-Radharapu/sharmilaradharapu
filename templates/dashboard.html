<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Art Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      font-family: 'Segoe UI', sans-serif;
      padding-top: 50px;
    }
    .dashboard-card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    .dashboard-card h2 {
      color: #333;
    }
    .btn-custom {
      padding: 12px 25px;
      font-size: 16px;
      margin: 10px 0;
      border-radius: 10px;
    }
    .upload-btn {
      background: linear-gradient(to right, #11998e, #38ef7d);
      color: white;
      border: none;
    }
    .browse-btn {
      background: linear-gradient(to right, #f857a6, #ff5858);
      color: white;
      border: none;
    }
    .logout-btn {
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      border: none;
    }
  </style>
</head>
<body>
  <div class="dashboard-card">
    <h2>🏠 Welcome, {{ username }}!</h2>
    <p>You are logged in as a <strong>{{ role }}</strong>.</p>

    {% if role == 'artist' %}
    <div>
      <h4 class="mt-4">🎨 Upload Your Abstract Artwork</h4>
      <a href="/upload" class="btn btn-custom upload-btn">📤 Upload Art</a>
    </div>
    {% endif %}

    <div>
      <h4 class="mt-4">🖼️ Browse Artworks</h4>
      <a href="/browse" class="btn btn-custom browse-btn">🛍️ View Gallery</a>
    </div>

    <div class="mt-4">
      <a href="/logout" class="btn btn-custom logout-btn">🚪 Logout</a>
    </div>
  </div>
</body>
</html>
