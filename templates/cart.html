<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart | Abstract Art Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #ffe29f, #ffa99f);
      font-family: 'Segoe UI', sans-serif;
      padding: 40px;
    }
    .cart-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .art-image {
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-5">🛒 Your Cart</h2>

    {% if items %}
      {% for item in items %}
      <div class="cart-card row align-items-center">
        <div class="col-md-3">
          <img src="{{ url_for('static', filename='uploads/' + item.filename) }}" class="img-fluid art-image" alt="{{ item.title }}">
        </div>
        <div class="col-md-6">
          <h5>{{ item.title }}</h5>
          <p class="mb-1"><strong>Artist:</strong> {{ item.artist }}</p>
          <p class="mb-0">{{ item.desc }}</p>
        </div>
        <div class="col-md-3 text-end">
          <h5 class="text-success">₹{{ item.price }}</h5>
        </div>
      </div>
      {% endfor %}

      <div class="text-end mt-4">
        <h4>Total: ₹{{ total }}</h4>
        
        <a href="/checkout" class="btn btn-success mt-2">✅ Checkout (Demo)</a>

      </div>
    {% else %}
      <p class="text-center">Your cart is empty. Browse and add some beautiful abstract art!</p>
    {% endif %}

    <div class="text-center mt-5">
      <a href="/browse" class="btn btn-secondary">⬅ Back to Gallery</a>
    </div>
  </div>
</body>
</html>
