<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Artwork | Art Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #c2e9fb, #a1c4fd);
      font-family: 'Segoe UI', sans-serif;
      padding-top: 60px;
    }
    .upload-card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .btn-upload {
      background: linear-gradient(to right, #ff9966, #ff5e62);
      color: white;
      border: none;
    }
    .btn-upload:hover {
      opacity: 0.9;
    }
    .form-label {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="upload-card">
    <h3 class="text-center mb-4">🎨 Upload Your Artwork</h3>
    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="title" class="form-label">🖌️ Title</label>
        <input type="text" class="form-control" name="title" id="title" required>
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">📝 Description</label>
        <textarea class="form-control" name="description" id="description" rows="4" required></textarea>
      </div>
      <div class="mb-3">
        <label for="price" class="form-label">💰 Price ($)</label>
        <input type="number" class="form-control" name="price" id="price" step="0.01" required>
      </div>
      <div class="mb-4">
        <label for="image" class="form-label">📸 Upload Image</label>
        <input type="file" class="form-control" name="image" id="image" accept="image/*" required>
      </div>
      <button type="submit" class="btn btn-upload w-100">🚀 Upload Artwork</button>
    </form>
    <div class="text-center mt-3">
      <a href="/dashboard" class="btn btn-secondary">⬅ Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
