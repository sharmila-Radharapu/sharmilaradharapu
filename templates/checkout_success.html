<!-- templates/checkout_success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(to right, #fbc2eb,#a6c1ee); height:100vh; display:flex; justify-content:center; align-items:center; margin:0; font-family:'Segoe UI',sans-serif; }
    .card { background:white; padding:40px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center; max-width:500px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>✅ Purchase Successful!</h2>
    <p>Thank you, {{ user }}. Your abstract art will be delivered soon.</p>
    <p class="mt-3"><strong>Name:</strong> {{ name }}<br>
                    <strong>Phone:</strong> {{ phone }}<br>
                    <strong>Address:</strong> {{ address }} – {{ pincode }}<br>
                    <strong>Payment:</strong> {{ payment }}</p>
    <a href="/dashboard" class="btn btn-success mt-4">🏠 Back to Dashboard</a>
  </div>
</body>
</html>
