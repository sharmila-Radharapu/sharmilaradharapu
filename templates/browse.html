<!-- templates/browse.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery | Art Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #fbc2eb, #a6c1ee);
      font-family: 'Segoe UI', sans-serif;
      padding: 40px;
    }
    .art-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 30px;
    }
    .art-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-5">🖼️ Abstract Art Gallery</h2>
    <div class="row">
      {% for art in artworks %}
      <div class="col-md-4">
        <div class="art-card">
          <img src="{{ url_for('static', filename='uploads/' + art.filename) }}" class="art-image mb-3" alt="{{ art.title }}">
          <h5>{{ art.title }}</h5>
          <p>{{ art.description }}</p>
          <p><strong>Price:</strong> ₹{{ art.price }}</p>
          <p><em>Artist:</em> {{ art.artist }}</p>
          {% if session['role'] == 'buyer' %}
            <a href="{{ url_for('cart_add', art_id=art.id) }}" class="btn btn-success btn-sm mt-2">🛒 Add to Cart</a>
          {% endif %}
        </div>
      </div>
      {% else %}
      <p class="text-center">No artworks available yet.</p>
      {% endfor %}
    </div>
    <div class="text-center mt-4">
      <a href="/dashboard" class="btn btn-primary">⬅ Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
