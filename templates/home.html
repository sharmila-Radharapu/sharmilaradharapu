<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abstract Art Buy & Sell Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }
    .btn-lg {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1 class="mb-4">🎨 Abstract Art Buy & Sell Platform</h1>
    <p class="lead mb-4">Discover unique abstract art or sell your own creations!</p>
    <div class="d-grid gap-3">
      <a href="/signup" class="btn btn-primary btn-lg">📝 Signup</a>
      <a href="/login"  class="btn btn-success btn-lg">🔐 Login</a>
    </div>
  </div>
</body>
</html>
